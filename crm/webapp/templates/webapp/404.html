{% extends "webapp/base.html" %}
{% load i18n %}

{% block content %}

<div style="display: flex; align-items: center; justify-content: center; min-height: 80vh; text-align: center;">
    <div>
        <h1 style="font-size: 5rem; color: var(--gold-accent); margin: 0; font-weight: 700;">404</h1>
        <h3 style="color: var(--text-primary); margin: 1rem 0 0.5rem 0;">{% trans "Page Not Found" %}</h3>
        <p style="color: var(--text-secondary); margin: 0 0 2rem 0;">{% trans "Sorry, the page you are looking for does not exist." %}</p>
        <hr style="border: 1px solid var(--border-color); margin: 2rem 0;">
        <a href="{% url 'dashboard' %}" class="btn btn-primary" style="min-width: 200px;">
            <i class="fa fa-arrow-left" aria-hidden="true"></i> &nbsp; {% trans "Return to Dashboard" %}
        </a>
    </div>
</div>

{% endblock content %}
