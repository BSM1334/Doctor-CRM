{% extends "webapp/base.html" %}
{% load i18n %}

{% block content %}

<div class="container" style="max-width: 600px; margin: 3rem auto;">
    <div class="card" style="background-color: var(--secondary-bg); border: 1px solid var(--border-color);">
        <div class="card-header"
            style="background-color: rgba(201, 168, 76, 0.1); border-bottom: 2px solid var(--gold-accent); color: var(--gold-accent);">
            <h3 style="margin: 0; font-weight: 600;">{% trans "Change Your Password" %}</h3>
            <p style="margin: 0.5rem 0 0 0; color: var(--text-secondary);">{% trans "Update your account password" %}
            </p>
        </div>
        <div class="card-body" style="padding: 2rem;">
            <hr style="border: 1px solid var(--border-color); margin: 0 0 1.5rem 0;">

            {% include "webapp/alerts.html" %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}

                <div class="form-group">
                    <label for="current_password" style="color: var(--text-secondary); font-weight: 600;"><strong>{% trans "Current Password" %}</strong></label>
                    <input type="password" class="form-control" id="current_password" name="current_password" required
                        style="background-color: var(--tertiary-bg); border: 1px solid var(--border-color); color: var(--text-primary);">
                </div>

                <hr style="border: 1px solid var(--border-color);">

                <div class="form-group">
                    <label for="new_password1" style="color: var(--text-secondary); font-weight: 600;"><strong>{% trans "New Password" %}</strong></label>
                    <input type="password" class="form-control" id="new_password1" name="new_password1" required
                        minlength="8"
                        style="background-color: var(--tertiary-bg); border: 1px solid var(--border-color); color: var(--text-primary);">
                </div>
                
                <hr style="border: 1px solid var(--border-color);">

                <div class="form-group">
                    <label for="new_password2" style="color: var(--text-secondary); font-weight: 600;"><strong>{% trans "Confirm New Password" %}</strong></label>
                    <input type="password" class="form-control" id="new_password2" name="new_password2" required
                        minlength="8"
                        style="background-color: var(--tertiary-bg); border: 1px solid var(--border-color); color: var(--text-primary);">
                </div>

                <br>

                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <button type="submit" class="btn btn-primary" style="min-width: 150px;">
                        <i class="fa fa-key"></i> &nbsp; {% trans "Change Password" %}
                    </button>
                    <a href="{% url 'sales_dashboard' %}" class="btn btn-secondary" style="min-width: 150px;">
                        <i class="fa fa-times"></i> &nbsp; {% trans "Cancel" %}
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
